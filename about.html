<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - Robins Luxe Threads</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar__logo"></a>
      <ul class="navbar__links" id="navLinks"></ul>
      <div class="navbar__toggle" id="navToggle" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <div class="about-hero">
    <h1 class="about-hero__title" id="aboutTitle"></h1>
    <p class="about-hero__desc" id="aboutDesc"></p>
  </div>

  <section class="section">
    <div class="container">
      <div class="about-content">
        <div class="about-content__text fade-in-left">
          <h3 id="whoWeAreTitle"></h3>
          <div id="aboutWhoContent"></div>
        </div>
        <div class="about-content__image fade-in-right" id="aboutImage">&#10024;</div>
      </div>
    </div>
  </section>

  <section class="section" style="background:var(--bg-card);">
    <div class="container">
      <div class="section__header">
        <h2 class="section__title" id="valuesTitle"></h2>
        <p class="section__subtitle" id="valuesSubtitle"></p>
        <div class="section__divider"></div>
      </div>
      <div class="about-values stagger-children" id="aboutValues"></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="features stagger-children" id="aboutStats"></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="newsletter scale-in">
        <h2 class="newsletter__title" id="ctaTitle"></h2>
        <p class="newsletter__desc" id="ctaDesc"></p>
        <a href="shop.html" class="btn btn--primary" id="ctaBtn"></a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer__grid">
        <div>
          <a href="index.html" class="navbar__logo"></a>
          <p class="footer__brand-desc"></p>
        </div>
        <div>
          <h4 class="footer__title">Quick Links</h4>
          <div class="footer__links" id="footerQuickLinks"></div>
        </div>
        <div>
          <h4 class="footer__title">Categories</h4>
          <div class="footer__links" id="footerCategories"></div>
        </div>
        <div>
          <h4 class="footer__title">Customer Care</h4>
          <div class="footer__links" id="footerCustomerCare"></div>
        </div>
      </div>
      <div class="footer__bottom"></div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadConfig().then(() => {
        renderNav();

        // About content from config
        document.getElementById('aboutTitle').textContent = cfg('about.title', 'Our Story');
        document.getElementById('aboutDesc').textContent = cfg('about.description', '');
        document.getElementById('whoWeAreTitle').textContent = cfg('ui.aboutPage.whoWeAreTitle', 'Who We Are');

        // Who We Are paragraphs
        const aboutData = cfg('about', {});
        const whoContent = document.getElementById('aboutWhoContent');
        const whoKeys = Object.keys(aboutData).filter(k => k.startsWith('whoWeAre')).sort();
        whoContent.innerHTML = whoKeys.map(k => `<p>${aboutData[k]}</p>`).join('');

        // About image
        const aboutImg = cfg('about.image', '');
        if (aboutImg) {
          document.getElementById('aboutImage').innerHTML = `<img src="${aboutImg}" alt="About Us" style="width:100%;height:100%;object-fit:cover;">`;
        }

        // Values
        document.getElementById('valuesTitle').textContent = cfg('ui.aboutPage.valuesTitle', 'What We Stand For');
        document.getElementById('valuesSubtitle').textContent = cfg('ui.aboutPage.valuesSubtitle', 'The pillars that define our brand');
        const values = cfg('about.values', []);
        const valuesEl = document.getElementById('aboutValues');
        if (valuesEl && values.length) {
          valuesEl.innerHTML = values.map(v => `
            <div class="about-value">
              <div class="about-value__icon">${v.image ? `<img src="${v.image}" alt="${v.title}" style="width:56px;height:56px;object-fit:contain;" onerror="this.outerHTML='${v.icon}'">` : v.icon}</div>
              <h3 class="about-value__title">${v.title}</h3>
              <p class="about-value__desc">${v.desc}</p>
            </div>
          `).join('');
        }

        // Stats
        const stats = cfg('about.stats', []);
        const statsEl = document.getElementById('aboutStats');
        if (statsEl && stats.length) {
          statsEl.innerHTML = stats.map(s => `
            <div class="feature">
              <div class="feature__icon" style="font-size:2.5rem;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;">${s.image ? `<img src="${s.image}" alt="${s.label}" style="width:56px;height:56px;object-fit:contain;margin-bottom:8px;" onerror="this.outerHTML='${s.number}'">` : s.number}</div>
              <h3 class="feature__title">${s.label}</h3>
              <p class="feature__desc">${s.desc}</p>
            </div>
          `).join('');
        }

        // CTA
        document.getElementById('ctaTitle').textContent = cfg('ui.aboutPage.ctaTitle', 'Ready to Explore?');
        document.getElementById('ctaDesc').textContent = cfg('ui.aboutPage.ctaDesc', 'Discover our latest collection.');
        document.getElementById('ctaBtn').textContent = cfg('ui.aboutPage.ctaBtn', 'Browse Collection →');

        renderFooter();
        applyBranding();
      });
    });
  </script>
</body>
</html>
