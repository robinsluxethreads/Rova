<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Robins Luxe Threads</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar__logo">ROBINS LUXE THREADS</a>
      <ul class="navbar__links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
      <div class="navbar__toggle" id="navToggle" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Page Banner -->
  <div class="page-banner">
    <h1 class="page-banner__title">Get in Touch</h1>
  </div>

  <!-- Contact Section -->
  <section class="section">
    <div class="container">
      <div class="contact-layout fade-in">
        <!-- Form -->
        <div>
          <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:8px;">Send Us a Message</h2>
          <p style="color:var(--text-secondary);margin-bottom:30px;">Have a question or feedback? We'd love to hear from you.</p>
          <form class="contact-form" onsubmit="submitContact(event)">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" id="cfFirstName" placeholder="Jane" required>
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="cfLastName" placeholder="Doe" required>
              </div>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="cfEmail" placeholder="jane@example.com" required>
            </div>
            <div class="form-group">
              <label>Subject</label>
              <select id="cfSubject" required>
                <option value="">Select a topic</option>
                <option>Order Inquiry</option>
                <option>Shipping & Delivery</option>
                <option>Returns & Exchanges</option>
                <option>Product Question</option>
                <option>General Feedback</option>
              </select>
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea id="cfMessage" placeholder="Tell us how we can help..." required></textarea>
            </div>
            <button type="submit" class="btn btn--primary" id="cfSubmitBtn">Send Message &#8594;</button>
          </form>
        </div>

        <!-- Contact Info -->
        <div class="contact-info" id="contactCards"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__grid">
        <div>
          <a href="index.html" class="navbar__logo">ROBINS LUXE THREADS</a>
          <p class="footer__brand-desc"></p>
        </div>
        <div>
          <h4 class="footer__title">Quick Links</h4>
          <div class="footer__links">
            <a href="shop.html">Shop All</a>
            <a href="about.html">Our Story</a>
            <a href="contact.html">Contact</a>
          </div>
        </div>
        <div>
          <h4 class="footer__title">Categories</h4>
          <div class="footer__links" id="footerCategories"></div>
        </div>
        <div>
          <h4 class="footer__title">Customer Care</h4>
          <div class="footer__links">
            <a href="#">Shipping Info</a>
            <a href="#">Returns & Exchanges</a>
          </div>
        </div>
      </div>
      <div class="footer__bottom"></div>
    </div>
  </footer>

  <div class="toast" id="toast"></div>
  <script src="js/main.js"></script>
  <script>
    const CONTACT_FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSdiHmxNpVvf_D0fjMlpciESBVHmrDD68gWhm8jFHDum6o8uTg/formResponse';

    function submitContact(e) {
      e.preventDefault();
      const btn = document.getElementById('cfSubmitBtn');
      btn.textContent = 'SENDING...';
      btn.style.pointerEvents = 'none';

      let iframe = document.getElementById('cf-iframe');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = 'cf-iframe';
        iframe.name = 'cf-iframe';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
      }

      const form = document.createElement('form');
      form.method = 'POST';
      form.action = CONTACT_FORM_ACTION;
      form.target = 'cf-iframe';

      const fields = {
        'entry.785740097': document.getElementById('cfFirstName').value,
        'entry.634884441': document.getElementById('cfLastName').value,
        'entry.115479147': document.getElementById('cfEmail').value,
        'entry.81727957': document.getElementById('cfSubject').value,
        'entry.373541668': document.getElementById('cfMessage').value
      };

      Object.entries(fields).forEach(([name, value]) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = name;
        input.value = value;
        form.appendChild(input);
      });

      document.body.appendChild(form);
      form.submit();
      document.body.removeChild(form);

      setTimeout(() => {
        showToast('Message sent successfully! We\'ll get back to you soon.');
        e.target.reset();
        btn.textContent = 'SENT ✓';
        setTimeout(() => {
          btn.innerHTML = 'Send Message &#8594;';
          btn.style.pointerEvents = 'auto';
        }, 3000);
      }, 1000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadConfig().then(() => {
        const cards = document.getElementById('contactCards');
        const address = cfg('contact.address', '').replace(/\n/g, '<br>');
        const email = cfg('contact.email', '');
        const supportEmail = cfg('contact.supportEmail', '');
        const phone = cfg('contact.phone', '');
        const phoneHours = cfg('contact.phoneHours', '');
        const storeHours = cfg('contact.storeHours', '').replace(/\n/g, '<br>');

        cards.innerHTML = `
          <div class="contact-info__card">
            <div class="contact-info__card-icon">📍</div>
            <h3 class="contact-info__card-title">Visit Us</h3>
            <p class="contact-info__card-text">${address}</p>
          </div>
          <div class="contact-info__card">
            <div class="contact-info__card-icon">📧</div>
            <h3 class="contact-info__card-title">Email Us</h3>
            <p class="contact-info__card-text">${email}${supportEmail ? '<br>' + supportEmail : ''}</p>
          </div>
          <div class="contact-info__card">
            <div class="contact-info__card-icon">📞</div>
            <h3 class="contact-info__card-title">Call Us</h3>
            <p class="contact-info__card-text">${phone}<br>${phoneHours}</p>
          </div>
          <div class="contact-info__card">
            <div class="contact-info__card-icon">🕐</div>
            <h3 class="contact-info__card-title">Store Hours</h3>
            <p class="contact-info__card-text">${storeHours}</p>
          </div>
        `;

        renderFooterCategories();
        applyBranding();
      });
    });
  </script>
</body>
</html>
