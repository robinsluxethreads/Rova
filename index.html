<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robins Luxe Threads - Elegance Redefined</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar__logo"></a>
      <ul class="navbar__links" id="navLinks"></ul>
      <div class="navbar__toggle" id="navToggle" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero__content">
      <p class="hero__subtitle" id="heroSubtitle"></p>
      <h1 class="hero__title" id="heroTitle"></h1>
      <p class="hero__desc" id="heroDesc"></p>
      <a href="shop.html" class="btn btn--primary" id="heroBtn"></a>
    </div>
  </section>

  <!-- Categories -->
  <section class="section fade-in">
    <div class="container">
      <div class="section__header">
        <h2 class="section__title" id="catTitle"></h2>
        <p class="section__subtitle" id="catSubtitle"></p>
        <div class="section__divider"></div>
      </div>
      <div class="categories stagger-children" id="homeCategories"></div>
    </div>
  </section>

  <!-- Trending Products -->
  <section class="section fade-in" style="background: var(--bg-card);">
    <div class="container">
      <div class="section__header">
        <h2 class="section__title" id="trendingTitle"></h2>
        <p class="section__subtitle" id="trendingSubtitle"></p>
        <div class="section__divider"></div>
      </div>
      <div class="products-grid" id="trendingProducts"></div>
      <div style="text-align:center;margin-top:40px;">
        <a href="shop.html" class="btn btn--outline" id="viewAllBtn"></a>
      </div>
    </div>
  </section>

  <!-- Features -->
  <section class="section">
    <div class="container">
      <div class="features stagger-children" id="homeFeatures"></div>
    </div>
  </section>

  <!-- Newsletter -->
  <section class="section">
    <div class="container">
      <div class="newsletter scale-in">
        <h2 class="newsletter__title" id="nlTitle"></h2>
        <p class="newsletter__desc" id="nlDesc"></p>
        <form class="newsletter__form" onsubmit="submitNewsletter(event)">
          <input type="email" class="newsletter__input" id="newsletterEmail" placeholder="" required>
          <button type="submit" class="btn btn--primary" id="newsletterBtn"></button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__grid">
        <div>
          <a href="index.html" class="navbar__logo"></a>
          <p class="footer__brand-desc"></p>
          <div class="footer__social" id="footerSocial"></div>
        </div>
        <div>
          <h4 class="footer__title">Quick Links</h4>
          <div class="footer__links" id="footerQuickLinks"></div>
        </div>
        <div>
          <h4 class="footer__title">Categories</h4>
          <div class="footer__links" id="footerCategories"></div>
        </div>
        <div>
          <h4 class="footer__title">Customer Care</h4>
          <div class="footer__links" id="footerCustomerCare"></div>
        </div>
      </div>
      <div class="footer__bottom"></div>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadSiteData().then(() => {
        // Nav
        renderNav();

        // Hero
        document.getElementById('heroSubtitle').textContent = cfg('brand.heroSubtitle', '');
        document.getElementById('heroTitle').textContent = cfg('brand.heroTitle', '');
        document.getElementById('heroDesc').textContent = cfg('brand.heroDesc', '');
        document.getElementById('heroBtn').textContent = cfg('ui.shopNowBtn', 'Shop Now →');

        // Categories section
        document.getElementById('catTitle').textContent = cfg('ui.categorySection.title', 'Shop by Category');
        document.getElementById('catSubtitle').textContent = cfg('ui.categorySection.subtitle', 'Find your perfect style');
        renderCategories('homeCategories');

        // Trending
        document.getElementById('trendingTitle').textContent = cfg('trending.title', 'Trending Now');
        document.getElementById('trendingSubtitle').textContent = cfg('trending.subtitle', '');
        document.getElementById('viewAllBtn').textContent = cfg('ui.viewAllBtn', 'View All Products →');
        const trendingCount = cfg('trending.count', 8) || 8;
        const trendingIds = cfg('trending.productIds', []);
        const mixCategories = cfg('trending.mixCategories', true);
        let trendingList;
        if (trendingIds && trendingIds.length > 0) {
          trendingList = trendingIds.map(id => products.find(p => p.id === id)).filter(Boolean);
        } else if (mixCategories) {
          const cats = cfg('categories', []).map(c => c.name);
          const perCat = Math.ceil(trendingCount / cats.length);
          trendingList = [];
          cats.forEach(cat => {
            const shuffled = products.filter(p => p.category === cat).sort(() => 0.5 - Math.random());
            trendingList.push(...shuffled.slice(0, perCat));
          });
          trendingList = trendingList.slice(0, trendingCount);
        } else {
          trendingList = products.slice(0, trendingCount);
        }
        renderProducts('trendingProducts', trendingList);

        // Features
        const features = cfg('features', []);
        const featEl = document.getElementById('homeFeatures');
        if (featEl && features.length) {
          featEl.innerHTML = features.map(f => `
            <div class="feature">
              <div class="feature__icon">${f.image ? `<img src="${f.image}" alt="${f.title}" style="width:48px;height:48px;object-fit:contain;" onerror="this.outerHTML='${f.icon}'">` : f.icon}</div>
              <h3 class="feature__title">${f.title}</h3>
              <p class="feature__desc">${f.desc}</p>
            </div>
          `).join('');
        }

        // Newsletter
        document.getElementById('nlTitle').textContent = cfg('ui.newsletter.title', 'Stay in the Loop');
        document.getElementById('nlDesc').textContent = cfg('ui.newsletter.desc', '');
        document.getElementById('newsletterEmail').placeholder = cfg('ui.newsletter.placeholder', 'Enter your email');
        document.getElementById('newsletterBtn').textContent = cfg('ui.newsletter.btn', 'Subscribe');

        // Footer
        renderFooter();
        applyBranding();
      });
    });
  </script>
</body>
</html>
